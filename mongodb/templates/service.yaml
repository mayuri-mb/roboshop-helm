apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb 
spec:
  selector:
    project: roboshop
    tier: db
    component: mongodb  
  ports:
  - protocol: TCP
    port: 27017        #service port
    targetPort: 27017  #container port  