apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  replicas: "{{ .Values.deployment.replicas }}"
  selector:  
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue 
    spec:
      containers:
        - name: catalogue
          image: "{{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}"
          imagePullPolicy: Always  # safe to pull everytime, there may be images with same version rebuilt and pushed
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"    
          
          readinessProbe:
            tcpSocket:
              port: 8080
              # httpGet:
                # path: /heath
                #   port: 8080
            failureThreshold: 5
            periodSeconds: 10
            initialDelaySeconds: 20
          livenessProbe:
            httpGet: 
              path: /health
              port: 8080
            failureThreshold: 5
            periodSeconds: 10  
          envFrom:
          - configMapRef:
              name: catalogue             
